<div class="register-container">
    <mat-card>
        <h2>Регистрация</h2>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Имейл</mat-label>
                <input matInput formControlName="email" type="email" placeholder="example@mail.com">
                <mat-icon matSuffix>email</mat-icon>
            </mat-form-field>
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Парола</mat-label>
                <input matInput formControlName="password" type="password">
                <mat-icon matSuffix>lock</mat-icon>
            </mat-form-field>
            <mat-card-actions>
                <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid">
                    Регистрация
                </button>
            </mat-card-actions>
        </form>
        <div class="column">
            <div>
                <h4>Ако вече имате регистрация</h4>
            </div>
            <button matButton routerLink="/login">Към вход</button>
        </div>
    </mat-card>
</div>
